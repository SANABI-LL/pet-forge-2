<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>pet-forge · hello-idle</title>
<style>
  /*
    pet-forge SVG 路线 hello-world idle 模板
    ─────────────────────────────────────────
    一个会呼吸 + 眨眼的占位圆球，证明 skill 工作流通。
    这是起点，不是成品。用户应该把 #pet 内的造型替换成自己的角色，
    然后调 :root 里的 CSS 变量适配自己的节奏档位。

    自包含：内联 SVG + CSS + JS，零外部依赖。双击即跑。
  */

  :root {
    /* 套 apple-precise preset 的节奏档位（详见 routes/svg/presets/apple-precise.md） */
    --breath-period: 4.8s;       /* 呼吸周期：4-8s 缓周期 */
    --breath-min: 0.97;          /* 呼吸最小缩放 */
    --breath-max: 1.02;          /* 呼吸最大缩放（5-10% 微妙幅度） */

    --blink-min-gap: 3000;       /* 眨眼最小间隔 ms */
    --blink-max-gap: 7000;       /* 眨眼最大间隔 ms */
    --blink-duration: 150;       /* 单次眨眼时长 ms */

    /* 视觉锚点：用户应该改这些颜色适配自己的角色 */
    --pet-fill: #F5F6FA;
    --pet-stroke: #B8C0CC;
    --eye-color: #5B6BCB;
    --bg: #FAFBFD;
  }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, system-ui, sans-serif;
  }

  #stage {
    width: 320px;
    height: 320px;
    display: block;
  }

  /* 呼吸：整体缩放循环
     pivot 在中心。transform-origin 是关键，错了就会整体漂移。 */
  #pet {
    transform-origin: 100px 100px;
    animation: breathe var(--breath-period) ease-in-out infinite;
  }

  @keyframes breathe {
    0%   { transform: scale(var(--breath-min)); }
    50%  { transform: scale(var(--breath-max)); }
    100% { transform: scale(var(--breath-min)); }
  }

  /* 眨眼：scaleY 压扁
     用 CSS class 切换，由 JS 在随机间隔触发。
     pivot 锚在眼睛中心，避免眼睛压扁时位置漂移。 */
  .eye {
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.075s ease-out;
  }
  .eye.blink {
    transform: scaleY(0.05);
  }

  /* 顶部说明文字 */
  #hint {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #99A;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div id="hint">pet-forge · hello-idle · 替换 #pet 里的造型即可上手</div>

<svg id="stage" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!--
    用户起手点：把 #pet 里的内容换成自己的角色 SVG（从 png2svg 流水线出来的成品）。
    保留 transform-origin 在 100,100，眨眼用 .eye class 标记。
  -->
  <g id="pet">
    <!-- 主体：一个简单的圆 -->
    <circle cx="100" cy="100" r="65"
            fill="var(--pet-fill)"
            stroke="var(--pet-stroke)" stroke-width="2.5"/>

    <!-- 双眼：左 / 右 -->
    <circle class="eye" cx="80" cy="95" r="6" fill="var(--eye-color)"/>
    <circle class="eye" cx="120" cy="95" r="6" fill="var(--eye-color)"/>
  </g>
</svg>

<script>
  /*
    眨眼调度：随机间隔 + 偶尔双连眨
    ───────────────────────────────
    单次眨眼 = 加 .blink → 等 duration → 去掉
    随机间隔 = blink-min-gap 到 blink-max-gap 之间
    10% 概率双连眨（更生动，不要规律性循环）
  */
  const eyes = document.querySelectorAll('.eye');
  const root = getComputedStyle(document.documentElement);
  const minGap = parseInt(root.getPropertyValue('--blink-min-gap'));
  const maxGap = parseInt(root.getPropertyValue('--blink-max-gap'));
  const blinkMs = parseInt(root.getPropertyValue('--blink-duration'));

  function blinkOnce() {
    eyes.forEach(e => e.classList.add('blink'));
    setTimeout(() => eyes.forEach(e => e.classList.remove('blink')), blinkMs);
  }

  function scheduleNext() {
    const gap = minGap + Math.random() * (maxGap - minGap);
    setTimeout(() => {
      blinkOnce();
      // 10% 概率双连眨
      if (Math.random() < 0.1) {
        setTimeout(blinkOnce, blinkMs + 120);
      }
      scheduleNext();
    }, gap);
  }

  scheduleNext();
</script>

</body>
</html>
